services:
  - type: web
    name: coast-api
    runtime: python
    plan: professional
    buildCommand: apt-get update && apt-get install -y poppler-utils && pip install -r requirements.txt
    startCommand: gunicorn server:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --graceful-timeout 120 --workers 1
    disk:
      name: coast-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: DATABASE_PATH
        value: "/data/coast.db"
      - key: CHROMA_PATH
        value: "/data/chroma"
      - key: FRONTEND_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
