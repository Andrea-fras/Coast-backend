services:
  - type: web
    name: coast-api
    runtime: python
    plan: professional
    buildCommand: apt-get update && apt-get install -y poppler-utils && pip install -r requirements.txt
    startCommand: gunicorn server:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 300 --graceful-timeout 300 --workers 1
    disk:
      name: coast-data
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: DATABASE_PATH
        value: "/data/coast.db"
      - key: CHROMA_PATH
        value: "/data/chroma"
      # ── OMA (content + student memory) — MUST live on the persistent disk ──
      - key: RAG_PROVIDER
        value: "oma"
      - key: STUDENT_OMA_ENABLED
        value: "true"
      - key: OMA_DB_PATH
        value: "/data/oma_data/oma.db"
      - key: OMA_IMAGE_DIR
        value: "/data/oma_data/images"
      - key: OMA_DESCRIBE_IMAGES
        value: "true"
      - key: OMA_OPENAI_MODEL
        value: "gpt-4o-mini"
      - key: OMA_OPENAI_VISION_MODEL
        value: "gpt-4o-mini"
      - key: GENERATED_DIR
        value: "/data/generated"
      # User-uploaded PDFs + extracted source images — must survive redeploys
      - key: FOLDER_UPLOADS_DIR
        value: "/data/folder_uploads"
      - key: PEDRO_PROVIDER
        value: "gemini"
      - key: FRONTEND_URL
        value: "https://app.coast.academy"
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
